name: CMake

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Configure
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=Release
          -DQB_BUILD_TESTS=ON
          -DQB_BUILD_BENCHMARKS=ON

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

  # AddressSanitizer + UndefinedBehaviorSanitizer on Ubuntu (tests only; benchmarks off for speed).
  sanitize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Configure (ASan + UBSan)
        run: >
          cmake -B build-sanitize
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_CXX_FLAGS="-O1 -g -fsanitize=address,undefined -fno-omit-frame-pointer"
          -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"
          -DCMAKE_SHARED_LINKER_FLAGS="-fsanitize=address,undefined"
          -DQB_BUILD_TESTS=ON
          -DQB_BUILD_BENCHMARKS=OFF

      - name: Build
        run: cmake --build build-sanitize --parallel

      - name: Test
        env:
          ASAN_OPTIONS: detect_leaks=1:abort_on_error=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: ctest --test-dir build-sanitize --output-on-failure

  # Ensures docs/Doxyfile.in and paths stay valid (Doxygen + CMake configure).
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Doxygen
        run: sudo apt-get update && sudo apt-get install -y doxygen

      - name: Configure (documentation only)
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=Release
          -DQB_BUILD_TESTS=OFF
          -DQB_BUILD_BENCHMARKS=OFF
          -DQB_LINQ_BUILD_DOCS=ON

      - name: Build Doxygen HTML
        run: cmake --build build --config Release --target qb_linq_docs

      - name: Fail on Doxygen warnings
        run: |
          log="build/doxygen-qb-linq.warnings.log"
          if [ -f "$log" ] && [ -s "$log" ]; then
            echo "::error::Doxygen wrote warnings to $log"
            cat "$log"
            exit 1
          fi
